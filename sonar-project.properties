sonar.host.url=http://localhost:9000
sonar.projectKey=fquiz
sonar.projectName=FQuiz
sonar.projectVersion=1.0.0

# Source folders
sonar.sources=app,components,hooks,lib,store
sonar.exclusions=node_modules/**,.next/**,.vercel/**,coverage/**,public/**,dist/**,out/**,scripts/**,task/**

# Test folders — list base dirs so SonarQube recognizes __tests__ subdirs
sonar.tests=lib,app,components,store
sonar.test.inclusions=**/__tests__/**/*.test.ts,**/__tests__/**/*.test.tsx

# Coverage report path
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test execution report (SonarQube generic format)
sonar.testExecutionReportPaths=test-results/sonar-report.xml

# Exclude files with very low or no coverage from counting
sonar.coverage.exclusions=**/models/**,**/schemas/**,**/constants/**,**/*.d.ts,scripts/**,**/quiz-import/**

# Source encoding
sonar.sourceEncoding=UTF-8
